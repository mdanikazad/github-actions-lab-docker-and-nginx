name: Docker Nginx Lab

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  docker:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t mynginx:test .

      - name: Test Docker image
        run: |
          docker run -d -p 8080:80 --name test-nginx mynginx:test
          sleep 5
          curl http://localhost:8080 | grep "Hello from GitHub Actions"
          docker stop test-nginx

      - name: Health check
        run: |
          curl -f http://localhost:8080 || exit 1

      - name: Tag version
        run: docker tag mynginx:test ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}
